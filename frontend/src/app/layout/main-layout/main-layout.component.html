<app-header 
  [user]="user$ | async"
  (toggleSidebar)="toggleSidebar()">
</app-header>

<div class="layout">

  <app-sidebar *ngIf="isSidebarOpen"></app-sidebar>

  <div class="content">

    <app-breadcrumb></app-breadcrumb>

    <div class="page-content">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>

<app-confirm-modal
  [visible]="showSessionPopup"
  title="Sesión inactiva"
  message="Has estado inactivo durante 5 minutos. Tu sesión se cerrará automáticamente si no respondes."
  confirmText="Continuar sesión"
  cancelText="Cerrar sesión"
  [countdown]="sessionCountdown"
  (confirm)="continuarSesion()"
  (cancel)="cerrarSesion()"
  (close)="cerrarPopup()">
</app-confirm-modal>
