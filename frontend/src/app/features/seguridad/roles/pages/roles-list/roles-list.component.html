

  <h2>Roles</h2>

  <div class="spinner" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Cargando roles...</p>
  </div>

  <div class="error" *ngIf="!loading && error">
    {{ error }}
  </div>

<div class="table-container">
  <table class="erp-table" *ngIf="!loading && !error && roles.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let rol of roles">
        <td>{{ rol.idRol }}</td>
        <td>{{ rol.nombre }}</td>
        <td>{{ rol.descripcion }}</td>
        <td>  
          <span 
            class="estado activo">
            Activo
          </span>
        </td>
        <td class="acciones">
            <i class="fa fa-pen icon editar"></i>
            <i class="fa fa-trash icon eliminar"></i>
        </td>
      </tr>
    </tbody>

  </table>
</div>
  <div class="empty" *ngIf="!loading && !error && roles.length === 0">
    No hay roles registrados.
  </div>
